name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # numpy (tests) + scipy (receiver/decoder.py, pulled in transitively by
      # tests/test_receiver.py). matplotlib and pyserial are not needed: the
      # decode tests run against synthetic waveforms, no dashboard, no hardware.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy

      - name: Run tests
        run: python -m unittest discover -s tests -v
